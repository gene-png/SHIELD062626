name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + black + pytest + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install API + dev tools
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit

      - name: ruff check
        working-directory: apps/api
        run: ruff check .

      - name: black --check
        working-directory: apps/api
        run: black --check .

      - name: pytest -m unit
        working-directory: apps/api
        run: pytest -m unit tests/unit

      - name: bandit
        run: bandit -q -c pyproject.toml -r apps/api/app

  web:
    name: Web (prettier + eslint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: prettier --check
        run: pnpm format:check

      - name: eslint
        run: pnpm -F web lint

      - name: tsc --noEmit
        run: pnpm -F web typecheck

      - name: next build
        env:
          NEXTAUTH_SECRET: ci-only-not-a-real-secret-1234567890
          API_BASE_URL: http://localhost:8000
        run: pnpm -F web build

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
