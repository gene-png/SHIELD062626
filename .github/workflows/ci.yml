name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + black + pytest + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install API + dev tools
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit

      - name: ruff check
        working-directory: apps/api
        run: ruff check .

      - name: black --check
        working-directory: apps/api
        run: black --check .

      - name: pytest -m unit
        working-directory: apps/api
        run: pytest -m unit tests/unit

      - name: bandit
        run: bandit -q -c pyproject.toml -r apps/api/app

      # Work Order F: dependency audit. Surfaces advisories; Dependabot opens the
      # fix PRs, so this reports without blocking on a freshly-published CVE.
      - name: pip-audit
        working-directory: apps/api
        continue-on-error: true
        run: pip-audit

  web:
    name: Web (prettier + eslint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Version comes from package.json's packageManager field; specifying it
      # here too makes pnpm/action-setup hard-error on the double definition.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      # Work Order F: dependency audit (Dependabot opens the fix PRs).
      - name: pnpm audit
        continue-on-error: true
        run: pnpm audit --audit-level high

      - name: prettier --check
        run: pnpm format:check

      - name: eslint
        run: pnpm -F web lint

      - name: tsc --noEmit
        run: pnpm -F web typecheck

      - name: vitest
        run: pnpm -F web test

      - name: next build
        env:
          NEXTAUTH_SECRET: ci-only-not-a-real-secret-1234567890
          API_BASE_URL: http://localhost:8000
        run: pnpm -F web build

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Host-run Playwright smoke suite against the full composed stack. This
  # reproduces the canonical fresh-stack bring-up documented in e2e/README.md
  # and proven end-to-end locally in S2 T2 (down -v + reseed + full suite, 27/27
  # green on a pristine DB). CI runs with no .env, so web stays on :3000 and the
  # docker-compose.yml defaults apply. Those defaults now include
  # SHIELD_EMAIL_DELIVERY_ENABLED=true (Sprint 7 T3), so `docker compose up -d`
  # brings up MailHog and the s21 email-verify/reset spec RUNS here (no longer
  # self-skips). The runner has Docker + Compose v2.
  e2e:
    name: E2E (Playwright smoke suite)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      # Bring up postgres/redis/minio/keycloak/mailhog/api/web from the repo
      # compose file. NEXTAUTH_SECRET mirrors the web job's ci-only value so we
      # don't ship the literal dev placeholder; every other var uses the
      # compose-file default, all of which are ci-safe.
      - name: Compose up
        env:
          NEXTAUTH_SECRET: ci-only-not-a-real-secret-1234567890
        run: docker compose up -d

      # The api container only serves after `alembic upgrade head`; Keycloak
      # cold start is the slow gate. Poll with a generous budget and FAIL LOUDLY
      # (dump logs, non-zero exit) if the stack never becomes healthy.
      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "api healthy after ${i} attempt(s)"; exit 0
            fi
            sleep 5
          done
          echo "::error::api did not become healthy within budget"
          docker compose logs api keycloak
          exit 1

      - name: Seed demo tenant
        run: docker compose exec -T api python scripts/seed_demo.py

      # web's first boot installs pnpm deps into the container before next dev
      # starts listening. Poll on :3000 with the same fail-loud contract.
      - name: Wait for web
        run: |
          for i in $(seq 1 72); do
            if curl -sf http://localhost:3000 >/dev/null; then
              echo "web up after ${i} attempt(s)"; exit 0
            fi
            sleep 5
          done
          echo "::error::web did not come up within budget"
          docker compose logs web
          exit 1

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # GitHub Actions sets CI=true, so playwright.config.ts applies retries: 1.
      - name: Run Playwright suite
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report and traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # Hosted-demo bring-up job (Sprint 9 T9). Runs the one-command reset in its
  # own isolated runner so its `docker compose down -v` cannot touch the e2e
  # job's stack, builds the PRODUCTION web image (shield-web:demo) via the
  # docker-compose.demo.yml overlay, seeds the Atlas story inside the script,
  # and drives the opt-in demo-journey spec against the just-reset prod stack.
  # No .env is needed — the compose defaults (web on :3000, WEB_PORT unset) are
  # what baseUrl.ts resolves to, so the reset script and Playwright agree.
  demo:
    name: Demo (hosted-demo reset + journey spec)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      # The demo overlay's `volumes: !reset []` needs Compose >= 2.24 (the tag
      # is a silent no-op below it, leaking the base dev bind-mounts into the
      # prod image and breaking the standalone bundle). Log the version and FAIL
      # LOUDLY below the floor rather than debug a mis-tagged mount later.
      - name: Docker Compose version (require >= 2.24 for !reset)
        run: |
          docker compose version
          ver="$(docker compose version --short | sed 's/^v//')"
          major="$(echo "$ver" | cut -d. -f1)"
          minor="$(echo "$ver" | cut -d. -f2)"
          if [ "$major" -lt 2 ] || { [ "$major" -eq 2 ] && [ "$minor" -lt 24 ]; }; then
            echo "::error::docker compose $ver is below the 2.24 floor required for the '!reset' tag in docker-compose.demo.yml"
            exit 1
          fi
          echo "docker compose $ver satisfies the >= 2.24 floor"

      # One-command reset: down -v -> up -d --build (shield-web:demo) -> /ready
      # full-matrix poll -> seed_demo.py -> fail-loud web wait. The script owns
      # the whole bring-up; a failed prod build or a stalled web boot exits
      # non-zero here (Sprint 9 T8 fixed the silent web wait).
      - name: Demo reset (--demo overlay)
        run: bash scripts/demo-reset.sh --demo

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # SHIELD_DEMO_SMOKE=1 opts the demo-journey spec in (it self-skips
      # otherwise, so it can never run against a stack it didn't just reset).
      - name: Run demo-journey spec
        working-directory: e2e
        env:
          SHIELD_DEMO_SMOKE: "1"
        run: npx playwright test demo/

      # Always-run diagnostics mirroring the e2e job's fail-loud pattern: on a
      # red run the compose state + logs are the first thing you want, and a
      # green run's output is cheap to skip past.
      - name: Diagnostics (compose ps + logs)
        if: always()
        run: |
          echo "==== docker compose ps ===="
          docker compose -f docker-compose.yml -f docker-compose.demo.yml ps
          echo "==== docker compose logs (tail) ===="
          docker compose -f docker-compose.yml -f docker-compose.demo.yml logs --no-color --tail=200

      - name: Upload Playwright report and traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demo-playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore
